services:
  db:
    image: postgres:17
    container_name: odoo_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - postgres_data:/var/lib/postgresql/data

  odoo:
    image: odoo:19
    container_name: odoo_app
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./custom_addons:/mnt/production-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo

volumes:
  postgres_data: